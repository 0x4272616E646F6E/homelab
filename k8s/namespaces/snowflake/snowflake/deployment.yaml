apiVersion: apps/v1
kind: Deployment
metadata:
  name: snowflake
  namespace: snowflake
  labels:
    app.kubernetes.io/name: snowflake
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snowflake
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snowflake
        app.kubernetes.io/managed-by: flux
    spec:
      automountServiceAccountToken: false
      containers:
        - name: snowflake
          # renovate: datasource=docker depName=containers.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake
          image: containers.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake:latest@sha256:82f80dd23899d07ead4069c7b94b65636b6757586bf5d7d65f5ec45b05d554df
          imagePullPolicy: IfNotPresent
          args:
            - -verbose
            - -capacity
            - "10"
            - -metrics
            - -metrics-port
            - "9000"
            - -metrics-address
            - "0.0.0.0"
          ports:
            - name: metrics
              containerPort: 9000
              protocol: TCP
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "5Gi"
