apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelfmark
  namespace: media
  labels:
    app.kubernetes.io/name: shelfmark
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/egress: wireguard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: shelfmark
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shelfmark
        app.kubernetes.io/managed-by: flux
        app.kubernetes.io/egress: wireguard
    spec:
      runtimeClassName: youki
      initContainers:
        - name: init-log-perms
          image: busybox:1.38@sha256:b6762ddf4a50aabb5f4d21aa6f447d05d5633fb09f09c08b33f22356a2f98be0
          command:
            - sh
            - -c
            - |
              mkdir -p /var/log/shelfmark && chown -R 1000:1000 /var/log/shelfmark
          securityContext:
            runAsUser: 0
            runAsGroup: 0
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: shelfmark
          # renovate: datasource=docker depName=ghcr.io/calibrain/shelfmark-lite
          image: ghcr.io/calibrain/shelfmark-lite:latest@sha256:655168ef4dd1af939d368f9a8448bf2606888f8221b014f219a3a8eab1c4b307
          imagePullPolicy: IfNotPresent
          env:
            - name: EXT_BYPASSER_URL
              value: "http://flaresolverr:8191"
          ports:
            - containerPort: 8084
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2048Mi"
              ephemeral-storage: "5Gi"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /downloads
              subPath: downloads
            - name: media
              mountPath: /books
              subPath: media/books
            - name: log
              mountPath: /var/log/shelfmark
      volumes:
        - name: log
          emptyDir: {}
        - name: config
          persistentVolumeClaim:
            claimName: shelfmark-config
        - name: media
          persistentVolumeClaim:
            claimName: media
