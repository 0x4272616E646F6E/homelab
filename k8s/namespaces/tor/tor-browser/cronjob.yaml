apiVersion: v1
kind: ServiceAccount
metadata:
  name: tor-browser-restart
  namespace: tor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tor-browser-restart
  namespace: tor
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["tor-browser"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tor-browser-restart
  namespace: tor
subjects:
  - kind: ServiceAccount
    name: tor-browser-restart
    namespace: tor
roleRef:
  kind: Role
  name: tor-browser-restart
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tor-browser-restart
  namespace: tor
spec:
  # Run daily at 4 AM
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: tor-browser-restart
          restartPolicy: OnFailure
          automountServiceAccountToken: true
          containers:
            - name: restart
              image: alpine/k8s:1.35.3@sha256:097aa60cbef561146757c7494468e9d7b04d843597ad1a1515ed09d0708c8014
              command:
                - kubectl
                - rollout
                - restart
                - deployment/tor-browser
                - -n
                - tor
