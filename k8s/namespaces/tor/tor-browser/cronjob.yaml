apiVersion: v1
kind: ServiceAccount
metadata:
  name: tor-browser-restart
  namespace: tor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tor-browser-restart
  namespace: tor
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["tor-browser"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tor-browser-restart
  namespace: tor
subjects:
  - kind: ServiceAccount
    name: tor-browser-restart
    namespace: tor
roleRef:
  kind: Role
  name: tor-browser-restart
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tor-browser-restart
  namespace: tor
spec:
  # Run daily at 7:00 AM UTC (3:00 AM EDT & 4:00 AM EST)
  schedule: "0 7 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: tor-browser-restart
          restartPolicy: OnFailure
          automountServiceAccountToken: true
          containers:
            - name: restart
              image: alpine/k8s:1.36.1@sha256:692239d739589247c4a791205ed9619c28ae85a21286e19a6211c04a62c56668
              command:
                - kubectl
                - rollout
                - restart
                - deployment/tor-browser
                - -n
                - tor
