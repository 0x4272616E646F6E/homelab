apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamacpp-model
  namespace: development
  labels:
    app.kubernetes.io/name: llamacpp-model
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llamacpp-model
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llamacpp-model
        app.kubernetes.io/managed-by: flux
    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 300
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      - name: fetch-webui
        image: curlimages/curl:8.21.0@sha256:7c12af72ceb38b7432ab85e1a265cff6ae58e06f95539d539b654f2cfa64bb13
        env:
        - name: HF_TOKEN
          valueFrom: { secretKeyRef: { name: vllm-secrets, key: token } }
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -eu
            if [ -f /ui/index.html ]; then
              echo "WebUI already present, skipping fetch"
              exit 0
            fi
            echo "Fetching llama-ui dist.tar.gz from HF bucket..."
            curl -fsSL -H "Authorization: Bearer ${HF_TOKEN}" \
              "https://huggingface.co/buckets/ggml-org/llama-ui/resolve/latest/dist.tar.gz?download=true" \
              -o /tmp/dist.tar.gz
            tar -xzf /tmp/dist.tar.gz -C /ui
            rm /tmp/dist.tar.gz
            echo "WebUI extracted:"
            ls /ui
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        volumeMounts:
        - { name: ui,  mountPath: /ui }
        - { name: tmp, mountPath: /tmp }
        resources:
          requests: { cpu: "10m",  memory: "32Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
      containers:
      - name: llamacpp-model
        # renovate: datasource=docker depName=ghcr.io/ggml-org/llama.cpp
        image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:f96be8dfd1c1eb533e09f42fc4d92311150dc63ecd568284c9199cacae5a9e26
        imagePullPolicy: IfNotPresent
        args:
          - --hf-repo
          - mradermacher/Qwen3.6-27B-uncensored-heretic-v2-Native-MTP-Preserved-i1-GGUF
          - --hf-file
          - Qwen3.6-27B-uncensored-heretic-v2-Native-MTP-Preserved.i1-IQ4_XS.gguf
          - --alias
          - Qwen3.6-27B
          - --port
          - "8000"
          - --n-gpu-layers
          - "999"
          - --ctx-size
          - "32768"
          - --cache-type-k
          - q8_0
          - --cache-type-v
          - q8_0
          - --parallel
          - "1"
          - --batch-size
          - "2048"
          - --ubatch-size
          - "512"
          - --threads-http
          - "4"
          - --flash-attn
          - "on"
          - --temp
          - "0.6"
          - --top-p
          - "0.95"
          - --top-k
          - "20"
          - --min-p
          - "0.00"
          - --spec-type
          - draft-mtp
          - --spec-draft-n-max
          - "2"
          - --jinja
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom: { secretKeyRef: { name: vllm-secrets, key: token } }
        - { name: HF_HOME,               value: /models/.cache/hf }
        - { name: HUGGINGFACE_HUB_CACHE, value: /models/.cache/huggingface }
        - { name: CUDA_VISIBLE_DEVICES,  value: "0" }
        - { name: LLAMA_ARG_HOST,        value: "0.0.0.0" }
        - { name: GGML_CUDA_DISABLE_GRAPHS, value: "1" }
        - { name: LLAMA_ARG_STATIC_PATH,   value: "/ui" }
        ports:
        - { containerPort: 8000, name: http }
        resources:
          requests: { cpu: "2", memory: "8Gi", nvidia.com/gpu: "1", ephemeral-storage: "10Gi" }
          limits:   { cpu: "4", memory: "16Gi", nvidia.com/gpu: "1", ephemeral-storage: "30Gi" }
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities: { drop: ["ALL"] }
        volumeMounts:
        - { name: cache-volume, mountPath: /models }
        - { name: tmp,          mountPath: /tmp }
        - { name: ui,           mountPath: /ui, readOnly: true }
        readinessProbe:
          httpGet: { path: /health, port: http }
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 30
        startupProbe:
          httpGet: { path: /health, port: http }
          periodSeconds: 15
          failureThreshold: 60
        livenessProbe:
          httpGet: { path: /health, port: http }
          initialDelaySeconds: 600
          periodSeconds: 60
          failureThreshold: 5
          timeoutSeconds: 10
      volumes:
      - name: cache-volume
        persistentVolumeClaim: { claimName: llamacpp-model-pvc }
      - name: tmp
        emptyDir: {}
      - name: ui
        emptyDir: {}
