apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamacpp-model
  namespace: development
  labels:
    app.kubernetes.io/name: llamacpp-model
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: llamacpp-model
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llamacpp-model
        app.kubernetes.io/managed-by: flux
    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: 300
      automountServiceAccountToken: false
      containers:
      - name: llamacpp-model
        # renovate: datasource=docker depName=ghcr.io/ggml-org/llama.cpp
        image: ghcr.io/ggml-org/llama.cpp:server-cuda@sha256:ba098968e8966fb88e2456641ef2ac531d29c7f0c352bc82b0e79632118061cf
        imagePullPolicy: IfNotPresent
        args:
          - --hf-repo
          - mradermacher/Qwen3.6-28B-REAP-i1-GGUF
          - --hf-file
          - Qwen3.6-28B-REAP.i1-IQ4_XS.gguf
          - --alias
          - Qwen-3.6-35B-A3B-REAP
          - --host
          - "0.0.0.0"
          - --port
          - "8000"
          - --ctx-size
          - "131072"
          - --n-gpu-layers
          - "-1"
          - --parallel
          - "1"
          - --jinja
          - --cache-type-k
          - q8_0
          - --cache-type-v
          - q8_0
          - --reasoning
          - "on"
          - --chat-template-kwargs
          - '{"enable_thinking": true, "preserve_thinking": true}'
          - --temp
          - "0.6"
          - --top-p
          - "0.95"
          - --top-k
          - "20"
          - --min-p
          - "0.0"
          - --presence-penalty
          - "0.0"
          - --repeat-penalty
          - "1.0"
          - --flash-attn
          - "on"
          - --batch-size
          - "2048"
          - --ubatch-size
          - "512"
          - --threads
          - "8"
          - --threads-batch
          - "16"
          - --spec-type
          - ngram-mod
          - --spec-ngram-size-n
          - "24"
          - --draft-min
          - "48"
          - --draft-max
          - "64"
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom: { secretKeyRef: { name: vllm-secrets, key: token } }
        - { name: HF_HOME,               value: /models/.cache/hf }
        - { name: HUGGINGFACE_HUB_CACHE, value: /models/.cache/huggingface }
        - { name: CUDA_VISIBLE_DEVICES,  value: "0" }
        ports:
        - { containerPort: 8000, name: http }
        resources:
          requests: { cpu: "2", memory: "8Gi", nvidia.com/gpu: "1", ephemeral-storage: "10Gi" }
          limits:   { cpu: "4", memory: "16Gi", nvidia.com/gpu: "1", ephemeral-storage: "30Gi" }
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities: { drop: ["ALL"] }
        volumeMounts:
        - { name: cache-volume, mountPath: /root/.cache/llama.cpp }
        - { name: tmp,          mountPath: /tmp }
        readinessProbe:
          httpGet: { path: /health, port: http }
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 30
        startupProbe:
          httpGet: { path: /health, port: http }
          periodSeconds: 15
          failureThreshold: 60
      volumes:
      - name: cache-volume
        persistentVolumeClaim: { claimName: llamacpp-model-pvc }
      - name: tmp
        emptyDir: {}
