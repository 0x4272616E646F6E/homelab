name: SonarQube

permissions:
  contents: read
  
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Analyze
    runs-on: actions-runner

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_SCANNER_OPTS: >
            -Dsonar.sources=ansible,k8s,terraform
            -Dsonar.inclusions=**/*.yaml,**/*.yml,**/*.json,**/*.tf,**/*.hcl
            -Dsonar.projectKey=homelab
