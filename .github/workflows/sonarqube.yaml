name: SonarQube

permissions:
  contents: read
  
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Analyze
    runs-on: actions-runner

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install dirmngr
        run: sudo apt-get update && sudo apt-get install -y dirmngr gnupg

      - uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_SCANNER_OPTS: >
            -Dsonar.sources=ansible,k8s,terraform
            -Dsonar.inclusions=**/*.yaml,**/*.yml,**/*.json,**/*.tf,**/*.hcl
            -Dsonar.projectKey=homelab
