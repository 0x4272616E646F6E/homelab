name: SonarQube

permissions:
  contents: read
  
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Analyze
    runs-on: actions-runner

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Install dirmngr
        run: sudo apt-get update && sudo apt-get install -y dirmngr gnupg

      - uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_SCANNER_OPTS: >
            -Dsonar.sources=ansible,k8s,terraform
            -Dsonar.inclusions=**/*.yaml,**/*.yml,**/*.json,**/*.tf,**/*.hcl
            -Dsonar.projectKey=homelab
